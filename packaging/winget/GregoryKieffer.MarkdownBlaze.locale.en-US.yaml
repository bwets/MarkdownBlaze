ShortDescription: A fast, offline Markdown viewer with syntax highlighting, Mermaid diagrams, callouts, and a live outline.
Description: |-
  MarkdownBlaze is a fast, offline viewer for Markdown files. It renders tables, task lists,
  fenced code with syntax highlighting (~190 languages), Mermaid diagrams, and admonitions, with a
  live document outline, in-app navigation between linked files, and reading history. It works
  entirely offline and collects no data.
